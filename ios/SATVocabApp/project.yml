name: SATVocabApp
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.WordScholar.WordScholarApp
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    DEVELOPMENT_TEAM: W6BCH2M54V

targets:
  SATVocabApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/SATVocabApp
      - path: Resources/Assets.xcassets
      - path: Resources/data.db
        buildPhase: resources
      - path: Resources/Images
        type: folder
        buildPhase: resources
      - path: Resources/MapBackgrounds
        type: folder
        buildPhase: resources
      - path: ../../word_list.json
        buildPhase: resources
      - path: ../../sat_reading_questions_deduplicated.json
        buildPhase: resources
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Automatic

  SATVocabWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SATVocabWidgets
      - path: Sources/SATVocabApp/Data/LiveActivityManager.swift
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.WordScholar.WordScholarApp.Widgets
        INFOPLIST_FILE: SATVocabWidgets/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        CODE_SIGN_STYLE: Automatic

  SATVocabAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SATVocabAppTests
    dependencies:
      - target: SATVocabApp
      - sdk: libsqlite3.tbd
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SATVocabApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SATVocabApp"
        BUNDLE_LOADER: "$(TEST_HOST)"

  SATVocabAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/SATVocabAppUITests
    dependencies:
      - target: SATVocabApp
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
